      }).filter(b => b.t_ || b.r_).sort((a, b) => b.pct - a.pct);
      // produk (with per-month breakdown Jan..latest, for the MtD-per-produk slide)
      nd.produk_nonkur = NONKUR.map(p => {
        const tt = T.reduce((a, r) => a + ((r.pc === p && ytdM.includes(r.m)) ? r.v : 0), 0);
        const rr = R.reduce((a, r) => a + ((r.pc === p && ytdM.includes(r.m)) ? r.v : 0), 0);
        const rrLY = RLY.reduce((a, r) => a + ((r.pc === p && ytdM.includes(r.m)) ? r.v : 0), 0);
        const ttAnnual = T.reduce((a, r) => a + ((r.pc === p && allM.includes(r.m)) ? r.v : 0), 0);
        const monthlyTarget = ytdM.map(m => rnd(T.reduce((a, r) => a + ((r.pc === p && r.m === m) ? r.v : 0), 0) / B, 2));
        const monthlyReal = ytdM.map(m => rnd(R.reduce((a, r) => a + ((r.pc === p && r.m === m) ? r.v : 0), 0) / B, 2));
        return {
          name: PNAME[p], target: rnd(tt / B, 2), real: rnd(rr / B, 2), pct: tt ? rnd(rr / tt * 100) : 0,
          target_annual: rnd(ttAnnual / B, 2), pct_annual: ttAnnual ? rnd(rr / ttAnnual * 100) : 0,
          yoy: yoyPct(rr, rrLY),
          monthly: { target: monthlyTarget, real: monthlyReal }
        };
      }).sort((a, b) => b.real - a.real);
      const tk = sumT(ytdM, ['KUR']), rk = sumR(ytdM, ['KUR']), tkAnnual = sumT(allM, ['KUR']);
      const kurMonthlyTarget = ytdM.map(m => rnd(sumT([m], ['KUR'], null) / B, 2));
      const kurMonthlyReal = ytdM.map(m => rnd(sumR([m], ['KUR'], null) / B, 2));
      nd.produk_kur = {
        // 2 desimal (bukan 1) agar konsisten dengan produk_nonkur dan blok ytd/seasonal —
        // pembulatan 1 desimal membuat 1700.47 tersimpan 1700.5 lalu tampil "1701 M" di slide
        // produk, padahal slide YtD menampilkan "1700 M" untuk target tahunan yang sama.
        target: rnd(tk / B, 2), real: rnd(rk / B, 2), pct: tk ? rnd(rk / tk * 100) : 0,
        target_annual: rnd(tkAnnual / B, 2), pct_annual: tkAnnual ? rnd(rk / tkAnnual * 100) : 0,
        yoy: yoyPct(rk, sumRLY(ytdM, ['KUR'])),
        monthly: { target: kurMonthlyTarget, real: kurMonthlyReal }
      };
      // per-bank KUR realisasi — prefer the dedicated "Fact_KUR_Bank" sheet (same row shape as
      // Fact_Realisasi: BO_Code, Produk_Code [KUR_BRI/KUR_BNI/KUR_BTN/KUR_MANDIRI/KUR_BPD/KUR_SWASTA],
      // Bulan, Realisasi_Rupiah — just kept in its own tab since it comes from a different source
      // system). Falls back to KUR_<bank> rows mixed into the main Fact_Realisasi sheet if no
      // dedicated sheet is provided. Nominal amounts are shown RAW, exactly as they appear in the
      // source sheet (no rescaling to the accounting KUR total) — per user requirement, the
      // per-bank figures must match the file's rincian angka-per-angka (e.g. BRI = 207M). Any
      // small month-level difference vs the accounting KUR series is a property of the source
      // data itself, not something the dashboard should silently redistribute.
      const bankEntries = (bankRows && bankRows.length)
        ? bankRows.map(r => ({ pc: r.Produk_Code, m: +r.Bulan, v: +r.Realisasi_Rupiah || 0 }))
        : R.filter(r => ('' + r.pc).startsWith('KUR_'));
      const bankRaw = {};
      bankEntries.forEach(r => { if (('' + r.pc).startsWith('KUR_') && ytdM.includes(r.m)) bankRaw[r.pc] = (bankRaw[r.pc] || 0) + r.v; });
      const bankTotalRaw = Object.values(bankRaw).reduce((a, b) => a + b, 0);
      nd.produk_kur_banks = Object.keys(bankRaw).map(bc => {
        // per-bank monthly trend (Jan..latest), raw from the source sheet
        const monthly = ytdM.map(m => rnd(bankEntries.reduce((a, r) => a + ((r.pc === bc && r.m === m) ? r.v : 0), 0) / B, 2));
        return {
          name: BANKNAME[bc] || bc.replace('KUR_', ''),
          real: rnd(bankRaw[bc] / B, 2),
          pct: bankTotalRaw ? rnd(bankRaw[bc] / bankTotalRaw * 100) : 0,
          monthly
        };
      }).sort((a, b) => b.real - a.real);
      // geo — target here MUST be the seasonal (elapsed-months) target, not the full-year target:
      // the map's bubble color encodes "tingkat pencapaian" (achievement level, ≥100%/80-99%/<80%),
      // which is only a meaningful apples-to-apples comparison against realisasi-to-date if the
      // target is scoped to the same Jan..latest window (matching how RO/BO seasonal pct works
      // everywhere else in the dashboard). Using the full annual target here would make nearly
      // every branch read as "underperforming" for most of the year purely because only part of
      // the annual target has elapsed, regardless of actual pace.
      nd.geo = cRows.filter(r => r.BO_Code !== 'KP001').map(r => {
        const bo = r.BO_Code;
        const tk = sumT(ytdM, ['KUR'], [bo]), rk = sumR(ytdM, ['KUR'], [bo]), tn = sumT(ytdM, ['NONKUR'], [bo]), rn = sumR(ytdM, ['NONKUR'], [bo]);
        if (!tk && !tn && !rk && !rn) return null;
        return {
          name: boName[bo] || bo, ro: (roName[r.RO_Code] || '').replace('Regional Office ', 'RO '),
          lat: +(+r.Latitude).toFixed(4), lng: +(+r.Longitude).toFixed(4),
          kur_t: rnd(tk / B), kur_r: rnd(rk / B), nonkur_t: rnd(tn / B), nonkur_r: rnd(rn / B), pct: (tk + tn) ? rnd((rk + rn) / (tk + tn) * 100) : 0
        };
      }).filter(Boolean);
      // monthly (company-wide)
      nd.months = ytdM.map(m => MONTH_SH[m - 1]);
      nd.monthly_target = ytdM.map(m => rnd(sumT([m], null, null) / B));
      nd.monthly_real = ytdM.map(m => rnd(sumR([m], null, null) / B));
      nd.meta = {
        latest_month: MONTH_FULL[latest - 1], latest_month_num: latest, year: 2026, n_ro: nd.ro.length, n_bo: nd.bo.length,
        annual_target_total: rnd(sumT(allM, null, null) / B), max_month: maxLatest
      };
      return nd;
    }

    let RAWROWS = null; // cached {ft, fr, cab} from the last uploaded workbook, used to recompute D per selected period
    /* ---------- pembaca .xlsx bawaan (tanpa pustaka eksternal) ----------
       Dipakai otomatis ketika pustaka SheetJS dari CDN tidak termuat — mis. jaringan kantor
       memblokir cdnjs.cloudflare.com, atau file dibuka tanpa internet. Membaca ZIP mentah dan
       mengekstrak XML sheet memakai DecompressionStream bawaan browser (Chrome/Edge 103+),
       lalu mengubahnya menjadi baris objek {Header: nilai} setara sheet_to_json({defval:0}). */
    async function miniParseXlsx(buf) {
      const u8 = new Uint8Array(buf);
      const dv = new DataView(buf);
      function decodeXml(s) {
        return s.replace(/&(amp|lt|gt|quot|apos|#\d+|#x[0-9a-fA-F]+);/g, (w, e) => {
          if (e === 'amp') return '&'; if (e === 'lt') return '<'; if (e === 'gt') return '>';
          if (e === 'quot') return '"'; if (e === 'apos') return "'";
          const hex = e[1] === 'x' || e[1] === 'X';
          return String.fromCodePoint(parseInt(e.slice(hex ? 2 : 1), hex ? 16 : 10));
        });
      }
      // End of Central Directory (scan mundur dari akhir file)
      let eocd = -1;
      for (let i = u8.length - 22; i >= Math.max(0, u8.length - 22 - 65557); i--) {
        if (dv.getUint32(i, true) === 0x06054b50) { eocd = i; break; }
      }
      if (eocd < 0) throw new Error('bukan file .xlsx yang valid');
      const cdCount = dv.getUint16(eocd + 10, true), cdOff = dv.getUint32(eocd + 16, true);
      const entries = {};
      let p = cdOff;
      for (let n = 0; n < cdCount; n++) {
        if (dv.getUint32(p, true) !== 0x02014b50) break;
        const method = dv.getUint16(p + 10, true), csize = dv.getUint32(p + 20, true);
        const nameLen = dv.getUint16(p + 28, true), extraLen = dv.getUint16(p + 30, true), cmtLen = dv.getUint16(p + 32, true);
        const lho = dv.getUint32(p + 42, true);
        entries[new TextDecoder().decode(u8.subarray(p + 46, p + 46 + nameLen))] = { method, csize, lho };
        p += 46 + nameLen + extraLen + cmtLen;
      }
      async function readEntry(name) {
        const e = entries[name];
        if (!e) return null;
        const nl = dv.getUint16(e.lho + 26, true), xl = dv.getUint16(e.lho + 28, true);
        const raw = u8.subarray(e.lho + 30 + nl + xl, e.lho + 30 + nl + xl + e.csize);
        if (e.method === 0) return new TextDecoder().decode(raw);
        if (e.method !== 8) throw new Error('kompresi ZIP tidak didukung');
        const stream = new Blob([raw]).stream().pipeThrough(new DecompressionStream('deflate-raw'));
        return await new Response(stream).text();
      }
      const wbXml = await readEntry('xl/workbook.xml');
      if (!wbXml) throw new Error('xl/workbook.xml tidak ditemukan');
      const relsXml = (await readEntry('xl/_rels/workbook.xml.rels')) || '';
      const relMap = {};
      for (const rm of relsXml.matchAll(/<Relationship\b[^>]*?\/?>/g)) {
        const idM = rm[0].match(/\bId="([^"]+)"/), tgM = rm[0].match(/\bTarget="([^"]+)"/);
        if (idM && tgM) relMap[idM[1]] = tgM[1];
      }
      const sheetFiles = {};
      for (const sm of wbXml.matchAll(/<sheet\b[^>]*?\/?>/g)) {
        const nmM = sm[0].match(/\bname="([^"]+)"/), ridM = sm[0].match(/\br:id="([^"]+)"/);
        if (!nmM || !ridM) continue;
        let tgt = relMap[ridM[1]] || '';
        // Target bisa relatif thd xl/ ("worksheets/sheet1.xml"), atau absolut paket dengan
        // garis miring depan ("/xl/worksheets/sheet1.xml" — gaya openpyxl/LibreOffice)
        if (tgt.startsWith('/')) tgt = tgt.slice(1);
        else if (!/^xl\//.test(tgt)) tgt = 'xl/' + tgt.replace(/^\.\//, '');
        sheetFiles[decodeXml(nmM[1])] = tgt;
      }
      const ssXml = await readEntry('xl/sharedStrings.xml');
      const shared = [];
      if (ssXml) {
        for (const si of ssXml.matchAll(/<si>([\s\S]*?)<\/si>/g)) {
          let txt = '';
          for (const t of si[1].matchAll(/<t[^>]*>([\s\S]*?)<\/t>/g)) txt += t[1];
          shared.push(decodeXml(txt));
        }
      }
      async function sheetRows(name) {
        const f = sheetFiles[name];
        if (!f) return null;
        const xml = await readEntry(f);
        if (!xml) return null;
        const rows = [];
        let hdr = null;
        for (const rm of xml.matchAll(/<row\b[^>]*>([\s\S]*?)<\/row>/g)) {
          const cells = {};
          let maxC = -1, hasVal = false;
          for (const cm of rm[1].matchAll(/<c\b([^>]*?)(?:\/>|>([\s\S]*?)<\/c>)/g)) {
            const attrs = cm[1] || '', body = cm[2] || '';
            const refM = attrs.match(/\br="([A-Z]+)\d+"/);
            if (!refM) continue;
            let col = 0;
            for (let i = 0; i < refM[1].length; i++) col = col * 26 + (refM[1].charCodeAt(i) - 64);
            col--;
            const tM = attrs.match(/\bt="([^"]+)"/);
            const t = tM ? tM[1] : 'n';
            let v;
            if (t === 'inlineStr') {
              const im = body.match(/<t[^>]*>([\s\S]*?)<\/t>/);
              v = im ? decodeXml(im[1]) : '';
            } else {
              const vm = body.match(/<v>([\s\S]*?)<\/v>/);
              if (!vm) continue; // sel format-saja (stub) dilewati
              if (t === 's') { const sv = shared[+vm[1]]; v = sv === undefined ? '' : sv; }
              else if (t === 'str') v = decodeXml(vm[1]);
              else if (t === 'e') v = 0; // sel error (#N/A dst.) -> 0; baris tersaring oleh clean*
              else if (t === 'b') v = +vm[1];
              else v = parseFloat(vm[1]);
            }
            if (v === '' || v === undefined || (typeof v === 'number' && isNaN(v))) continue;
            cells[col] = v; hasVal = true;
            if (col > maxC) maxC = col;
          }
          if (!hasVal) continue;
          if (!hdr) {
            hdr = [];
            for (let c = 0; c <= maxC; c++) hdr[c] = cells[c] !== undefined ? String(cells[c]) : ('__EMPTY_' + c);
            continue;
          }
          const obj = {};
          for (let c = 0; c < hdr.length; c++) obj[hdr[c]] = cells[c] !== undefined ? cells[c] : 0;
          rows.push(obj);
        }
        return rows;
      }
      return { sheetRows };
    }

    function loadWorkbook(file) {
      const reader = new FileReader();
      reader.onload = e => { handleWorkbookBuffer(e.target.result); };
      reader.onerror = () => toast('Gagal membaca file dari disk.', 'err');
      reader.readAsArrayBuffer(file);
    }
    async function handleWorkbookBuffer(buf) {
      // drop junk rows that survive parsing: lookup-error codes (#N/A), stray notes, or
      // defval-filled remnants. Dimension rows need a BO_Code string; fact rows need a
      // Produk_Code string and a sane Bulan. Rows in Fact_KUR_Bank whose BO_Code lookup
      // failed are kept on purpose — per-bank totals aggregate by Produk_Code only.
      const cleanDim = rows => rows.filter(r => typeof r.BO_Code === 'string' && r.BO_Code.trim() !== '');
      const cleanFact = rows => rows.filter(r => typeof r.Produk_Code === 'string' && r.Produk_Code.trim() !== '' && +r.Bulan >= 1 && +r.Bulan <= 12);
      try {
        let cab, ft, fr, frLY, fkb, viaMini = false;
        if (typeof XLSX !== 'undefined') {
          const wb = XLSX.read(new Uint8Array(buf), { type: 'array' });
          // trimRef: clamp the sheet's "!ref" range to the cells that actually hold values.
          // Excel files edited over time often carry a bloated dimension record (e.g. a single
          // style-only stub cell parked at row 1.048.576 makes the stored range "A1:H1048576").
          // sheet_to_json honors that range, so with { defval: 0 } it would iterate a MILLION
          // rows and allocate a zero-filled object for each — freezing or crashing the tab the
          // moment the file is loaded ("Muat Excel" appears to hang / errors out). Style-only
          // stub cells carry no value, so clamping to the max row/col that has a real value is
          // always safe and reduces the scan to the true data extent.
          const trimRef = s => {
            try {
              if (!s || !s['!ref']) return s;
              const rng = XLSX.utils.decode_range(s['!ref']);
              let maxR = -1, maxC = -1;
              Object.keys(s).forEach(k => {
                if (k.charCodeAt(0) === 33) return; // internal keys start with '!'
                const cell = s[k];
                if (!cell || cell.v === undefined || cell.v === null || cell.v === '') return;
                const a = XLSX.utils.decode_cell(k);
                if (a.r > maxR) maxR = a.r;
                if (a.c > maxC) maxC = a.c;
              });
              if (maxR >= 0 && (maxR < rng.e.r || maxC < rng.e.c)) {
                s['!ref'] = XLSX.utils.encode_range({ s: { r: rng.s.r, c: rng.s.c }, e: { r: maxR, c: maxC } });
              }
            } catch (trimErr) { /* on any surprise, fall back to the sheet as-is */ }
            return s;
          };
          const get = n => { const s = wb.Sheets[n]; if (!s) throw new Error('Sheet "' + n + '" tidak ditemukan'); return XLSX.utils.sheet_to_json(trimRef(s), { defval: 0 }); };
          const getOptional = n => { const s = wb.Sheets[n]; return s ? XLSX.utils.sheet_to_json(trimRef(s), { defval: 0 }) : null; };
          cab = cleanDim(get('Dim_Cabang')); ft = cleanFact(get('Fact_Target')); fr = cleanFact(get('Fact_Realisasi'));
          // optional sheets: absent = feature silently disabled, no error
          const frLYr = getOptional('Fact_Realisasi_LY'); // %YoY vs. same period last year
          const fkbr = getOptional('Fact_KUR_Bank'); // KUR realisasi per bank (angka mentah sesuai rincian)
          frLY = frLYr ? cleanFact(frLYr) : null;
          fkb = fkbr ? cleanFact(fkbr) : null;
        } else if (typeof DecompressionStream !== 'undefined') {
          // pustaka CDN tidak termuat -> pakai pembaca bawaan (mandiri, tanpa internet)
          viaMini = true;
          const mini = await miniParseXlsx(buf);
          const need = async n => { const r = await mini.sheetRows(n); if (!r) throw new Error('Sheet "' + n + '" tidak ditemukan'); return r; };
          cab = cleanDim(await need('Dim_Cabang')); ft = cleanFact(await need('Fact_Target')); fr = cleanFact(await need('Fact_Realisasi'));
          const frLYr = await mini.sheetRows('Fact_Realisasi_LY');
          const fkbr = await mini.sheetRows('Fact_KUR_Bank');
          frLY = frLYr ? cleanFact(frLYr) : null;
          fkb = fkbr ? cleanFact(fkbr) : null;
        } else {
          toast('Pustaka Excel dari internet tidak termuat dan browser ini belum mendukung mode mandiri — coba buka dengan Chrome/Edge versi terbaru.', 'err');
          return;
        }
        RAWROWS = { ft, fr, cab, frLY, fkb };
        const nd = computeD(ft, fr, cab, undefined, frLY, fkb);
        const maxMonth = nd.meta.max_month;
        PERIODS = Array.from({ length: maxMonth }, (_, i) => i + 1).map(m => ({
          key: 'm' + m, label: 'Data s.d. ' + MONTH_FULL[m - 1] + ' ' + nd.meta.year, month: m
        }));
        D = nd; buildAll(); go(0);
        const extras = [frLY ? 'YoY aktif' : null, fkb ? 'per-bank aktif' : null, viaMini ? 'mode mandiri' : null].filter(Boolean).join(', ');
        toast('Data ' + D.meta.latest_month + ' ' + D.meta.year + ' berhasil dimuat · ' + D.meta.n_bo + ' branch' + (extras ? ' · ' + extras : ''), 'ok');
      } catch (err) { toast('Gagal membaca file: ' + err.message, 'err'); }
    }
    function onPeriodChange(idx) {
      const p = PERIODS[idx];
      if (p.data) { D = p.data; }
      else if (RAWROWS) { D = computeD(RAWROWS.ft, RAWROWS.fr, RAWROWS.cab, p.month, RAWROWS.frLY, RAWROWS.fkb); }
      else return;
      buildAll(); go(0);
    }

    /* ---------- controller ---------- */
    let slideEls = [], dots = [], cur = 0, playing = true, elapsed = 0;
    const DUR = 13000, TICK = 100;
    const prog = document.getElementById('progress');
    const statusTxt = document.getElementById('statusTxt');
    const badge = document.getElementById('pausedBadge');
    const dotsWrap = document.getElementById('dots');

    function buildAll() {
      if (!D) { // versi publik: belum ada data dimuat
        document.getElementById('slides').innerHTML = `<div class="slide active" data-name="Muat Data">
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px">
            <div style="width:74px;height:74px;border-radius:20px;background:linear-gradient(135deg,var(--gab),#e0872a);display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:34px;color:#1a1204">S</div>
            <h2 style="margin:0">Dashboard Kinerja Subrogasi 2026</h2>
            <div style="max-width:620px;color:var(--dim);font-size:14px;line-height:1.75">Data dashboard ditarik langsung dari <b style="color:var(--ink)">Google Spreadsheet</b> — tidak ada upload manual. Setiap kali halaman dibuka, angka terbaru dimuat otomatis dari spreadsheet.</div>
            <button class="loadbtn" id="gsBtn" style="font-size:15px;padding:12px 24px;display:none" onclick="gsLoad()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>
              Muat Data dari Google Sheets
            </button>
            <div id="gsStatus" style="min-height:20px;font-size:12.5px;color:var(--gab);max-width:560px"></div>
            <button class="loadbtn" style="font-size:12px;opacity:.85" onclick="document.getElementById('fileInput').click()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="width:13px;height:13px"><path d="M12 3v12m0-12l-4 4m4-4l4 4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
              Cadangan: muat file Excel manual
            </button>
          </div>
        </div>`;
        slideEls = [...document.querySelectorAll('.slide')];
        dotsWrap.innerHTML = ''; dots = [];
        document.getElementById('brandTitle').textContent = 'Pencapaian Kinerja Subrogasi';
        document.getElementById('periodSel').innerHTML = '<option>Belum ada data</option>';
        cur = 0; render();
        return;
      }
      const slides = [slCover(),
      slKPI('01', 'Year to Date (YtD)', 'Pencapaian YtD terhadap Target Tahunan', 'Realisasi kumulatif s.d. ' + D.meta.latest_month + ' ' + D.meta.year + ' dibandingkan target penuh tahun ' + D.meta.year + '. Angka dalam Milyar (M).', D.ytd),
      slKPI('02', 'Month to Date (MtD)', 'Pencapaian Bulan ' + D.meta.latest_month + ' ' + D.meta.year, 'Realisasi bulan ' + D.meta.latest_month + ' dibandingkan target bulan ' + D.meta.latest_month + ' saja. Angka dalam Milyar (M).', D.mtd),
      slKPI('03', 'Seasonal · Periode Berjalan', 'Pencapaian Seasonal', 'Realisasi periode Jan–' + D.meta.latest_month + ' dibandingkan target periode yang sama. Angka dalam Milyar (M).', D.seasonal, seasonalTrend()),
      slRO(), slBO(), slBOAll(), slProduk(), slKurBank(), slProdukMtd(), slGeo(), slGeoDetail()];
      document.getElementById('slides').innerHTML = slides.join('');
      slideEls = [...document.querySelectorAll('.slide')];
      dotsWrap.innerHTML = '';
      slideEls.forEach((s, i) => {
        const dot = document.createElement('div'); dot.className = 'dot';
        dot.innerHTML = `<span class="tip">${s.dataset.name}</span>`; dot.onclick = () => go(i); dotsWrap.appendChild(dot);
      });
      dots = [...document.querySelectorAll('.dot')];
      document.getElementById('brandTitle').textContent = 'Pencapaian Kinerja Subrogasi s.d ' + D.meta.latest_month + ' ' + D.meta.year;
      const periodSel = document.getElementById('periodSel');
      periodSel.innerHTML = PERIODS.map((p, i) => `<option value="${i}">${p.label}</option>`).join('');
      periodSel.value = D.meta.latest_month_num ? (PERIODS.findIndex(p => (p.month || (p.data && p.data.meta.latest_month_num)) === D.meta.latest_month_num)) : PERIODS.length - 1;
      if (+periodSel.value < 0) periodSel.value = PERIODS.length - 1;
      render();
    }
    function render() {
      slideEls.forEach((s, i) => s.classList.toggle('active', i === cur));
      dots.forEach((d, i) => d.classList.toggle('on', i === cur));
      statusTxt.textContent = `${cur + 1} / ${slideEls.length} · ${slideEls[cur].dataset.name}`;
    }
    function go(i) { cur = (i + slideEls.length) % slideEls.length; elapsed = 0; prog.style.width = '0'; render(); }
    function next() { go(cur + 1) } function prev() { go(cur - 1) }

    setInterval(() => { if (!playing) return; elapsed += TICK; prog.style.width = (elapsed / DUR * 100) + '%'; if (elapsed >= DUR) next(); }, TICK);
    function setPlay(p) { playing = p; document.getElementById('playBtn').textContent = p ? '❚❚' : '▶'; badge.classList.toggle('show', !p); }
    document.getElementById('playBtn').onclick = () => setPlay(!playing);
    document.getElementById('nextBtn').onclick = next;
    document.getElementById('prevBtn').onclick = prev;
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') next(); else if (e.key === 'ArrowLeft') prev();
      else if (e.key === ' ') { e.preventDefault(); setPlay(!playing); }
    });
    const stage = document.getElementById('stage');
    stage.addEventListener('mouseenter', () => { if (playing) { setPlay(false); stage.dataset.hp = '1'; } });
    stage.addEventListener('mouseleave', () => { if (stage.dataset.hp === '1') { setPlay(true); stage.dataset.hp = ''; } });

    /* file loader wiring */
    const fileInput = document.getElementById('fileInput');
    document.getElementById('loadBtn').onclick = () => fileInput.click();
    fileInput.onchange = e => { if (e.target.files[0]) loadWorkbook(e.target.files[0]); e.target.value = ''; };

    /* period selector wiring */
    document.getElementById('periodSel').onchange = e => onPeriodChange(+e.target.value);

    /* theme toggle wiring */
    const SUN_PATH = '<circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.4M12 19.1v2.4M4.9 4.9l1.7 1.7M17.4 17.4l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.9 19.1l1.7-1.7M17.4 6.6l1.7-1.7"/>';
    const MOON_PATH = '<path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z"/>';
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('themeIcon').innerHTML = theme === 'light' ? SUN_PATH : MOON_PATH;
      buildAll();
    }
    document.getElementById('themeToggle').onclick = () => {
      const cur = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
      applyTheme(cur === 'light' ? 'dark' : 'light');
    };
    document.getElementById('themeIcon').innerHTML = MOON_PATH;

    let toastT;
    function toast(msg, cls = '') {
      const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast show ' + cls;
      clearTimeout(toastT); toastT = setTimeout(() => t.className = 'toast ' + cls, 3600);
    }

    /* scale + clock */
    function fit() { const s = Math.min(window.innerWidth / 1280, window.innerHeight / 720) * 0.96; stage.style.transform = `scale(${s})`; }
    window.addEventListener('resize', fit); fit();
    function clock() {
      const now = new Date(); const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
      document.getElementById('dateStr').textContent = `${days[now.getDay()]}, ${now.getDate()} ${MONTH_SH[now.getMonth()]} ${now.getFullYear()}`;
      document.getElementById('timeStr').textContent = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    }
    clock(); setInterval(clock, 1000);
    buildAll();

    /* ===== Muat otomatis dari Google Spreadsheet (tanpa login, tanpa upload) =====
       CARA SETUP (±5 menit, bisa dilakukan sendiri tanpa IT):
         1. PENTING: file harus berformat GOOGLE SHEETS ASLI, bukan .xlsx yang dibuka di
            Sheets (mode kompatibilitas — ikon hijau dengan label "XLSX"). Bila masih .xlsx:
            buka file-nya > menu File > "Save as Google Sheets" / "Simpan sebagai Google
            Spreadsheet". Ini membuat FILE BARU dengan link baru. Nama-nama tab (Dim_Cabang,
            Fact_Target, Fact_Realisasi, Fact_Realisasi_LY, Fact_KUR_Bank) terbawa otomatis.
         2. Klik "Share/Bagikan" > General access: "Anyone with the link" > "Viewer".
         3. Salin ID spreadsheet dari alamatnya:
            https://docs.google.com/spreadsheets/d/ <<< INI ID-NYA >>> /edit...
            lalu isi ke GS_CONFIG.spreadsheetId di bawah.
       PERHATIAN KEAMANAN: mode ini mengharuskan spreadsheet berstatus "siapa pun yang punya
       link bisa melihat". ID spreadsheet tertanam di file ini, jadi siapa pun yang memegang
       file dashboard (atau link-nya) dapat membaca datanya. Cocok untuk distribusi terbatas;
       untuk perlindungan berbasis login sungguhan, gunakan versi SharePoint/Entra ID. */
    const GS_CONFIG = {
      spreadsheetId: '1FJs1V0uhfoVXeV33dDw1ZaqDd1e7ZWIVVmm4RmRP62U' // Struktur_Data_Dashboard_Subrogasi_2026_V4 (Google Sheets asli)
    };
    const gsReady = () => !/^GANTI/.test(GS_CONFIG.spreadsheetId);
    function gsStatus(msg) { const el = document.getElementById('gsStatus'); if (el) el.textContent = msg || ''; }
    /* parser CSV kecil dengan dukungan tanda kutip (nilai berkoma/berbaris) */
    function parseCsv(text) {
      const rows = []; let row = [], cur = '', q = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (q) {
          if (ch === '"') { if (text[i + 1] === '"') { cur += '"'; i++; } else q = false; }
          else cur += ch;
        } else if (ch === '"') q = true;
        else if (ch === ',') { row.push(cur); cur = ''; }
        else if (ch === '\n') { row.push(cur); cur = ''; rows.push(row); row = []; }
        else if (ch !== '\r') cur += ch;
      }
      if (cur !== '' || row.length) { row.push(cur); rows.push(row); }
      return rows;
    }
    /* CSV gviz mengekspor angka SESUAI FORMAT TAMPILAN sel — "1,198,950,008" (gaya AS)
       atau "1.198.950.008" (gaya Indonesia). Normalisasi keduanya menjadi angka murni. */
    function gsNum(v) {
      if (v === '' || v === undefined) return '';
      if (/^-?\d+(\.\d+)?$/.test(v)) return parseFloat(v);                       // 1234567.89
      if (/^-?\d{1,3}(,\d{3})+(\.\d+)?$/.test(v)) return parseFloat(v.replace(/,/g, ''));            // 1,234,567.89
      if (/^-?\d{1,3}(\.\d{3})+(,\d+)?$/.test(v)) return parseFloat(v.replace(/\./g, '').replace(',', '.')); // 1.234.567,89
      return v; // teks biasa (kode, nama)
    }
    /* bangun baris objek dari tabel gviz — memberi NILAI MENTAH (v) terlepas dari format sel */
    function gsRowsFromTable(obj) {
      if (!obj || obj.status === 'error' || !obj.table) return null;
      let hdr = (obj.table.cols || []).map(c => ('' + (c.label || '')).trim());
      let rows = obj.table.rows || [];
      if (hdr.every(h => h === '') && rows.length) { // header tidak terbaca sebagai label -> pakai baris pertama
        hdr = rows[0].c.map(c => (c && c.v !== null && c.v !== undefined) ? String(c.v).trim() : '');
        rows = rows.slice(1);
      }
      const out = [];
      for (const r of rows) {
        if (!r || !r.c) continue;
        const o = {};
        let has = false;
        for (let c = 0; c < hdr.length; c++) {
          const cell = r.c[c];
          let v = (cell && cell.v !== null && cell.v !== undefined) ? cell.v : 0;
          if (v !== 0 && v !== '') has = true;
          o[hdr[c] || ('__EMPTY_' + c)] = v;
        }
        if (has) out.push(o);
      }
      return out;
    }
    function gsParseGvizJson(text) {
      const a = text.indexOf('setResponse(');
      const b = text.lastIndexOf(')');
      if (a < 0 || b < a) return null;
      let obj;
      try { obj = JSON.parse(text.substring(a + 'setResponse('.length, b)); } catch (e) { return null; }
      return gsRowsFromTable(obj);
    }
    /* JALUR UTAMA: JSONP via tag <script> — TIDAK tunduk pada CORS, sehingga bekerja bahkan
       ketika respons Google tidak menyertakan header izin lintas-situs (penyebab galat
       "Failed to fetch" pada fetch biasa). Pola resmi gviz: tqx=responseHandler:namaCallback. */
    let gsCbSeq = 0;
    function gsJsonp(name) {
      return new Promise((resolve, reject) => {
        const cb = 'gsCb_' + (++gsCbSeq);
        const s = document.createElement('script');
        const tm = setTimeout(() => { cleanup(); reject(new Error('waktu habis')); }, 15000);
        function cleanup() { clearTimeout(tm); delete window[cb]; if (s.parentNode) s.parentNode.removeChild(s); }
        window[cb] = obj => {
          const rows = gsRowsFromTable(obj);
          cleanup();
          if (rows && rows.length) resolve(rows); else reject(new Error('sheet kosong/tidak terbaca'));
        };
        s.onerror = () => { cleanup(); reject(new Error('script tidak termuat')); };
        s.src = 'https://docs.google.com/spreadsheets/d/' + GS_CONFIG.spreadsheetId +
          '/gviz/tq?headers=1&sheet=' + encodeURIComponent(name) + '&tqx=out:json;responseHandler:' + cb;
        document.head.appendChild(s);
      });
    }
    async function gsSheetRows(name, required) {
      const base = 'https://docs.google.com/spreadsheets/d/' + GS_CONFIG.spreadsheetId +
        '/gviz/tq?headers=1&sheet=' + encodeURIComponent(name) + '&tqx=out:';
      // 1) JSONP via <script> — kebal CORS (jalur paling andal di browser)
      try {
        const rows = await gsJsonp(name);
        if (rows && rows.length) return rows;
      } catch (e) { /* lanjut ke fetch */ }
      // 2) fetch JSON (nilai mentah) — bila CORS tersedia
      try {
        const rj = await fetch(base + 'json');
        if (rj.ok) {
          const rows = gsParseGvizJson(await rj.text());
          if (rows && rows.length) return rows;
        }
      } catch (e) { /* lanjut ke CSV */ }
      // 2) cadangan: CSV + normalisasi angka berformat
      const resp = await fetch(base + 'csv');
      if (!resp.ok) {
        if (required) throw new Error('sheet "' + name + '" tidak bisa diambil (' + resp.status + ') — pastikan spreadsheet dibagikan "Anyone with the link: Viewer"');
        return null;
      }
      const text = await resp.text();
      if (/^\s*</.test(text)) {
        if (required) throw new Error('sheet "' + name + '" tidak dapat dibaca — spreadsheet belum dibagikan "Anyone with the link"');
        return null;
      }
      const grid = parseCsv(text);
      if (!grid.length) return required ? (() => { throw new Error('sheet "' + name + '" kosong'); })() : null;
      const hdr = grid[0].map(h => ('' + h).trim());
      const out = [];
      for (let i = 1; i < grid.length; i++) {
        const r = grid[i];
        if (!r.some(v => v !== '' && v !== undefined)) continue;
        const o = {};
        for (let c = 0; c < hdr.length; c++) {
          const v = gsNum(r[c] === undefined ? '' : r[c]);
          o[hdr[c] || ('__EMPTY_' + c)] = v === '' ? 0 : v;
        }
        out.push(o);
      }
      return out;
    }
    // ambil semua sheet + hitung D. Dipakai bersama oleh muat awal & auto-refresh.
    async function gsFetchCompute() {
      const cleanDim = rows => rows.filter(r => typeof r.BO_Code === 'string' && r.BO_Code.trim() !== '');
      const cleanFact = rows => rows.filter(r => typeof r.Produk_Code === 'string' && r.Produk_Code.trim() !== '' && +r.Bulan >= 1 && +r.Bulan <= 12);
      const [cabR, ftR, frR, frLYr, fkbR] = await Promise.all([
        gsSheetRows('Dim_Cabang', true),
        gsSheetRows('Fact_Target', true),
        gsSheetRows('Fact_Realisasi', true),
        gsSheetRows('Fact_Realisasi_LY', false),
        gsSheetRows('Fact_KUR_Bank', false)
      ]);
      const cab = cleanDim(cabR), ft = cleanFact(ftR), fr = cleanFact(frR);
      const frLY = frLYr ? cleanFact(frLYr) : null;
      const fkb = fkbR ? cleanFact(fkbR) : null;
      const nd = computeD(ft, fr, cab, undefined, frLY, fkb);
      const periods = Array.from({ length: nd.meta.max_month }, (_, i) => i + 1).map(m => ({
        key: 'm' + m, label: 'Data s.d. ' + MONTH_FULL[m - 1] + ' ' + nd.meta.year, month: m
      }));
      return { nd, periods, raw: { ft, fr, cab, frLY, fkb } };
    }
    // muat awal (dengan status & pindah ke slide 0)
    async function gsLoad() {
      const btn = document.getElementById('gsBtn');
      if (btn) { btn.disabled = true; }
      gsStatus('Mengambil data dari Google Sheets…');
      try {
        const { nd, periods, raw } = await gsFetchCompute();
        RAWROWS = raw; PERIODS = periods; D = nd; buildAll(); go(0);
        const extras = [nd.ytd.kur.yoy != null ? 'YoY aktif' : null, (nd.produk_kur_banks && nd.produk_kur_banks.length) ? 'per-bank aktif' : null].filter(Boolean).join(', ');
        toast('Data ' + D.meta.latest_month + ' ' + D.meta.year + ' dimuat dari Google Sheets · ' + D.meta.n_bo + ' branch' + (extras ? ' · ' + extras : ''), 'ok');
        gsStartAutoRefresh();
      } catch (e) {
        gsStatus('Gagal: ' + e.message);
        if (btn) btn.disabled = false;
      }
    }
    // auto-refresh SENYAP: tarik ulang data & bangun ulang TANPA memindah slide (pertahankan
    // posisi & zoom peta). Dilewati saat slideshow di-pause (ada yang sedang berinteraksi/hover).
    async function gsRefresh() {
      if (!gsReady() || !D) return;
      if (!playing) return; // jangan ganggu bila sedang dilihat/diinteraksi (hover mem-pause)
      try {
        const prevMonth = D.meta.latest_month_num, prevReal = D.ytd.gab.real;
        const { nd, periods, raw } = await gsFetchCompute();
        RAWROWS = raw; PERIODS = periods; D = nd;
        buildAll(); // 'cur' (slide aktif) dipertahankan; tidak go(0)
        if (nd.meta.latest_month_num !== prevMonth || nd.ytd.gab.real !== prevReal) {
          toast('Data diperbarui · s.d. ' + nd.meta.latest_month + ' ' + nd.meta.year, 'ok');
        }
      } catch (e) { /* biarkan; tetap tampilkan data terakhir yang berhasil */ }
    }
    let gsTimer = null;
    function gsStartAutoRefresh() {
      if (gsTimer) return;
      gsTimer = setInterval(gsRefresh, 15 * 60 * 1000); // 15 menit
    }
    (function gsInit() {
      setTimeout(() => {
        const btn = document.getElementById('gsBtn');
        if (!btn) return;
        if (gsReady()) { btn.style.display = 'flex'; gsLoad(); /* langsung coba muat otomatis */ }
        else gsStatus('Belum dikonfigurasi: isi GS_CONFIG.spreadsheetId di dalam file ini (petunjuk lengkap ada di komentar kode, ±5 menit).');
      }, 80);
    })();


  </script>
